PACKAGE_NAME="mx_dma"
PACKAGE_VERSION="1.0.0"

BUILT_MODULE_NAME[0]="mx_dma"
DEST_MODULE_LOCATION[0]="/updates"

AUTOINSTALL="yes"

# CXL auto-detect: checks CEDT ACPI table at build time on the local machine.
# For cross-machine DKMS packaging, override WO_CXL manually if needed.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules $([ ! -e /sys/firmware/acpi/tables/CEDT ] && echo WO_CXL=1)"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

POST_INSTALL="scripts/dkms-post-install.sh"
